name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # Phase 2.J onward: the C++ backend (vcpkg OpenUSD) only
        # supports windows-x86_64 and macos-aarch64. macos-x86_64
        # was dropped because vcpkg's `usd` port does not build on
        # Intel macOS without extra wrangling, and the ARKit assets
        # yw-look targets run natively on Apple Silicon anyway.
        # `args` must include the per-OS overlay config so the C++
        # backend's runtime libraries (staged into
        # `src-tauri/cpp-artifacts/<triplet>/` by build.rs) get picked
        # up by the bundler. Without `--config`, tauri build reads
        # only tauri.conf.json and the installer ships without the
        # OpenUSD DLLs / dylibs — the app launches but every USD
        # open fails with a missing-library error on end-user
        # machines.
        include:
          - platform: windows-x86_64
            runner: windows-latest
            args: --config src-tauri/tauri.windows.json
          - platform: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --config src-tauri/tauri.macos.json

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    env:
      # vcpkg's x-gha binary cache so repeat releases don't rebuild
      # OpenUSD from source. First tag on a fresh vcpkg baseline
      # populates ~1 GB into the GHA cache; subsequent runs restore
      # in seconds.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      # `x-gha` reads these from env; JS steps get them natively but
      # shell steps do not, so re-export before the bootstrap block.
      - name: Export GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg "$env:USERPROFILE\vcpkg"
          $baseline = (Get-Content src-tauri/vcpkg.json -Raw | ConvertFrom-Json).'builtin-baseline'
          git -C "$env:USERPROFILE\vcpkg" fetch --depth=1 origin $baseline
          git -C "$env:USERPROFILE\vcpkg" checkout FETCH_HEAD
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Bootstrap vcpkg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          BASELINE=$(python3 -c "import json,sys; print(json.load(open('src-tauri/vcpkg.json'))['builtin-baseline'])")
          git -C "$HOME/vcpkg" fetch --depth=1 origin "$BASELINE"
          git -C "$HOME/vcpkg" checkout FETCH_HEAD
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-${{ matrix.platform }}
          cache-on-failure: true

      # bindgen needs libclang. Windows runners ship LLVM; macOS
      # needs `brew install llvm` (runner image only includes
      # Xcode's bundled clang-format / clang-tidy).
      - name: Set LIBCLANG_PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV

      - name: Set LIBCLANG_PATH (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew list --formula llvm >/dev/null 2>&1 || brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: yw-look ${{ github.ref_name }}
          releaseBody: See the attached installers and updater manifest for this release.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
