[package]
name = "yw-look"
version = "0.1.0"
description = "Quick look style asset viewer for CG workflows"
authors = ["OpenAI Codex"]
edition = "2021"

[package.metadata]

[lib]
name = "yw_look_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1.0", features = [] }

[dependencies]
# Phase 5e chameleon-investigation tip on `yw-look-phase4`. Carries
# every Phase 4/5 fork API plus two `#[ignore]` pin tests that nail
# the chameleon Apple AR Quick Look asset's UsdPreviewSurface stubs
# as an asset-side limitation rather than a fork bug — see
# `1a7758b` for the raw-USDC investigation. Bump again as
# `yw-look-phase4` advances.
openusd = { git = "https://github.com/yohawing/openusd.git", rev = "1a7758b1a1255c910f98ca8df4227e350fdf5a61" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.8.5", features = [] }
tauri-plugin-updater = "2.10.0"
url = "2"
# Phase 5c: USDZ archives are zip files; we open them in the GLB
# extraction path to pull out UsdPreviewSurface texture assets and
# embed them into the glTF binary chunk. openusd already pulls zip 8
# transitively, so this matches its version to share the build.
zip = { version = "8", default-features = false, features = ["deflate"] }

