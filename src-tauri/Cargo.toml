[package]
name = "yw-look"
version = "0.1.0"
description = "Quick look style asset viewer for CG workflows"
authors = ["OpenAI Codex"]
edition = "2021"

[package.metadata]

[lib]
name = "yw_look_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1.0", features = [] }

[dependencies]
# Phase 5c D tip + Phase 5c C fix on the `yw-look-phase4` branch of
# the fork. Carries StageLoadPolicy (Phase 4a), Stage::material_of
# (Phase 5a), Stage::skeleton_of (Phase 5b WIP), USDA parser
# time-sampled array fix (Phase 5c B), MeshData per-vertex skin
# payload (Phase 5c C), real Stage::skel_animation_of body (Phase 5c
# D), plus an elementSize-type fix that accepts Int as well as Int64
# so the chameleon Apple AR Quick Look asset still parses cleanly.
# Bump again as yw-look-phase4 advances.
openusd = { git = "https://github.com/yohawing/openusd.git", rev = "b36f6b40167d7dd9e13ff633a638e485cfcc4764" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.8.5", features = [] }
tauri-plugin-updater = "2.10.0"
url = "2"
# Phase 5c: USDZ archives are zip files; we open them in the GLB
# extraction path to pull out UsdPreviewSurface texture assets and
# embed them into the glTF binary chunk. openusd already pulls zip 8
# transitively, so this matches its version to share the build.
zip = { version = "8", default-features = false, features = ["deflate"] }

