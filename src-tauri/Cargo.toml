[package]
name = "yw-look"
version = "0.1.0"
description = "Quick look style asset viewer for CG workflows"
authors = ["OpenAI Codex"]
edition = "2021"

[package.metadata]

[lib]
name = "yw_look_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1.0", features = [] }

[dependencies]
# Phase 5b WIP tip on the `yw-look-phase4` branch of the fork. Carries
# StageLoadPolicy (Phase 4a), Stage::material_of (Phase 5a) and
# Stage::skeleton_of (Phase 5b WIP). Bump again as yw-look-phase4
# advances.
openusd = { git = "https://github.com/yohawing/openusd.git", rev = "5c44588a519c674b177e3fd71e979f294a4dd030" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.8.5", features = [] }
tauri-plugin-updater = "2.10.0"
url = "2"

