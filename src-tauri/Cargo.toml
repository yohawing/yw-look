[package]
name = "yw-look"
version = "0.1.0"
description = "Quick look style asset viewer for CG workflows"
authors = ["OpenAI Codex"]
edition = "2021"

[package.metadata]

[lib]
name = "yw_look_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1.0", features = [] }

[dependencies]
# Phase 5d L2 investigation tip on the `yw-look-phase4` branch of the
# fork. Carries everything Phase 4 / 5 plus the F1 Windows path
# normalization and an `#[ignore]` chameleon Material structure dump
# test that ruled out the NodeGraph-wrapping hypothesis for L2 — see
# `0d40283` for the diagnosis. Bump again as yw-look-phase4 advances.
openusd = { git = "https://github.com/yohawing/openusd.git", rev = "0d402833b44e2bbd08ba86f28412b9c77a543280" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.8.5", features = [] }
tauri-plugin-updater = "2.10.0"
url = "2"
# Phase 5c: USDZ archives are zip files; we open them in the GLB
# extraction path to pull out UsdPreviewSurface texture assets and
# embed them into the glTF binary chunk. openusd already pulls zip 8
# transitively, so this matches its version to share the build.
zip = { version = "8", default-features = false, features = ["deflate"] }

