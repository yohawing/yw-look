[package]
name = "yw-look"
version = "0.1.0"
description = "Quick look style asset viewer for CG workflows"
authors = ["OpenAI Codex"]
edition = "2021"

[package.metadata]

[lib]
name = "yw_look_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.1.0", features = [] }

[dependencies]
openusd = { git = "https://github.com/yohawing/openusd.git", rev = "4b3d9b2e8520026bedd01cd0a56de1dc792e814b" }
rfd = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.8.5", features = [] }
tauri-plugin-updater = "2.10.0"
url = "2"

# Phase 3 note: while the openusd subagent is rebuilding the fork on top of
# upstream main (re-porting Phase 1 features + adding Phase 3 geometry APIs),
# we keep the existing rev pinned. Once the subagent pushes `yw-look-phase3`,
# bump the rev above to that commit. We deliberately do NOT use a local
# `[patch]` here because the working tree at `../../openusd` switches branches
# during the rebuild and would otherwise destabilize this crate's build.
